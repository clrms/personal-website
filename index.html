<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elena Clorafel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:rgb(99,0,0);
            font-family:"Playfair Display", serif;
            padding:20px;
        }

        .login-card{
            background:rgb(38,0,0);
            color:rgb(251,251,118);
            width:100%;
            max-width:450px;
            padding:50px;
            border-radius:16px;
            text-align:center;
            border:2px solid rgba(0,0,0,.6);

            box-shadow:
                0 8px 32px rgba(0,0,0,.45),
                0 0 0 1px rgba(251,251,118,.06) inset;
        }

        .login-card h1{
            margin-bottom:10px;
            font-size:40px;
        }

        .subtitle{
            margin-bottom:30px;
            font-size:14px;
            letter-spacing:2px;
            color:rgba(251,251,118,.7);
        }

        .input-group{
            text-align:left;
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:15px;
            color:rgb(251,251,118);
        }

        .input-group input{
            width:100%;
            padding:12px 15px;
            border-radius:8px;
            border:2px solid rgb(251,251,118);
            background:rgb(99,0,0);
            color:white;
            font-size:16px;
        }

        .input-group input:focus{
            outline:none;
            box-shadow:0 0 10px rgba(251,251,118,.4);
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:rgb(251,251,118);
            color:rgb(38,0,0);
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
            margin-top:10px;
        }

        .login-btn:hover{
            background:white;
            transform:translateY(-2px);
        }

        .error{
            color:rgb(251,251,118);
            margin-top:15px;
            font-size:14px;
        }

        .success{
            color:#90ee90;
            margin-top:15px;
            font-size:14px;
        }

        @media (max-width:768px){

            .login-card{
                padding:35px 25px;
            }

            .login-card h1{
                font-size:32px;
            }
        }

    </style>
</head>
<body>

    <div class="login-card">

        <h1>Login</h1>
        <p class="subtitle">WELCOME BACK</p>

        <form id="loginForm">

            <div class="input-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    minlength="8"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <p id="message"></p>

        </form>

    </div>

    <script>

        document.getElementById("loginForm")
        .addEventListener("submit", function(e){

            e.preventDefault();

            const email =
            document.getElementById("email").value.trim();

            const password =
            document.getElementById("password").value;

            const message =
            document.getElementById("message");

            const emailPattern =
            /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(!emailPattern.test(email)){
                message.className = "error";
                message.textContent =
                "Please enter a valid email address.";
                return;
            }

            if(password.length < 8){
                message.className = "error";
                message.textContent =
                "Password must be at least 8 characters long.";
                return;
            }

            message.className = "success";
            window.location.href = "Integ.html";
        });

    </script>

</body>
</html>
